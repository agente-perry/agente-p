# Postgres + pgvector for local development.
# Use this when not connecting to Supabase cloud.
#
#   make db-up      → start
#   make db-down    → stop
#   make db-reset   → drop + recreate + run migrations

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contralatam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: contralatam
      POSTGRES_USER: contralatam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "5432:5432"
    volumes:
      - contralatam_pgdata:/var/lib/postgresql/data
      - ../../packages/db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contralatam -d contralatam"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  contralatam_pgdata:

[project]
name = "document-intelligence"
version = "0.1.0"
description = "Agentic document intelligence core for TDR/contract analysis with doctrine-anchored red flags"
requires-python = ">=3.11"
authors = [{name = "Agente Perry", email = "hackaton942@gmail.com"}]
license = {text = "MIT"}

dependencies = [
    "pydantic>=2.7",
    "click>=8.1",
    "numpy>=1.26",
    "pymupdf>=1.24",
    "faiss-cpu>=1.8",
    "rank-bm25>=0.2.2",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
llm = ["openai>=1.30"]
local-embed = ["sentence-transformers>=2.7"]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.5",
    "pyright>=1.1",
    "reportlab>=4.0",
    "types-PyYAML>=6.0",
]

[project.scripts]
document-intelligence = "document_intelligence.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/document_intelligence"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "A", "C4", "T20"]
ignore = ["E501"]

[tool.pyright]
include = ["src"]
strict = ["src/document_intelligence"]
pythonVersion = "3.11"
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
testpaths = ["tests"]

# Contralatam Agent — Mapa completo Fuente → Campo → Nodo del Grafo
# Claude Code: usa este archivo para saber exactamente qué parsear de cada fuente

sources:

  OCDS:
    name: "OCDS Perú — Open Contracting Data Registry"
    url: "https://data.open-contracting.org/es/publication/135"
    license: "CC BY 4.0"
    method: direct_download
    auth: none
    js_required: false
    update: monthly
    format: jsonl_gz
    download_pattern: "https://data.open-contracting.org/es/publication/135/download?name={year}.jsonl.gz"
    bootstrap_years: [2022, 2023, 2024, 2025, 2026]
    parser_lib: ijson  # streaming — no cargar todo en RAM
    encoding: utf-8
    nodes_populated:
      - Contract
      - PublicEntity
      - Company  # buyer + suppliers
    edges_created:
      - GANO_CONTRATO     # awards[].suppliers[] → contract
      - POSTULO_EN        # tenderers[] → contract (si no ganó)
    field_mapping:
      ocid:
        source_path: "$.ocid"
        target: "Contract.ocid"
      tender_method:
        source_path: "$.tender.procurementMethod"
        target: "Contract.tender_method"
        transform: "lowercase"
      tender_method_details:
        source_path: "$.tender.procurementMethodDetails"
        target: "Contract.tender_method_details"
      objeto:
        source_path: "$.tender.title"
        target: "Contract.objeto"
      monto_convocado:
        source_path: "$.tender.value.amount"
        target: "Contract.monto_conv"
      num_postores:
        source_path: "$.tender.numberOfTenderers"
        target: "Contract.num_postores"
      fecha_convocatoria:
        source_path: "$.tender.tenderPeriod.startDate"
        target: "Contract.fecha_conv"
        transform: "date_parse"
      fecha_cierre_conv:
        source_path: "$.tender.tenderPeriod.endDate"
        target: "Contract.fecha_cierre_conv"
        transform: "date_parse"
      monto_adjudicado:
        source_path: "$.awards[0].value.amount"
        target: "Contract.monto_adj"
      monto_contratado:
        source_path: "$.contracts[0].value.amount"
        target: "Contract.monto_contrato"
      buyer_ruc:
        source_path: "$.buyer.identifier.id"
        target: "PublicEntity.ruc_entidad"
      buyer_name:
        source_path: "$.buyer.name"
        target: "PublicEntity.nombre_canonico"
      supplier_ruc:
        source_path: "$.awards[*].suppliers[*].identifier.id"
        target: "Company.ruc"
        multi: true
      supplier_name:
        source_path: "$.awards[*].suppliers[*].name"
        target: "Company.razon_social"
        multi: true
    computed_fields:
      dias_plazo_conv:
        formula: "business_days(fecha_conv, fecha_cierre_conv)"
        note: "Excluir fines de semana y feriados peruanos"
      delta_monto_pct:
        formula: "abs(monto_contrato - monto_conv) / monto_conv"
        condition: "monto_conv > 0"
      percentil_monto:
        formula: "PERCENT_RANK() OVER (PARTITION BY tender_method ORDER BY monto_conv)"
        requires: "bulk calculation after ingestion"
    ocds_extensions_used:
      - name: "Department"
        field: "tender.bidders[].address.region"
        target: "Contract.region"
      - name: "Tender Information"
        field: "tender.lots"
        target: "Contract.metadata.lots"

  SUNAT_PADRON:
    name: "SUNAT — Padrón Reducido del RUC"
    url: "https://www.sunat.gob.pe/descargaPRR/mrc137_padron_reducido.html"
    method: direct_download_zip
    auth: none
    js_required: false
    update: monthly
    format: zip_txt
    download_urls:
      padron_ruc: "http://www2.sunat.gob.pe/padron_reducido_ruc.zip"
      local_anexo: "https://www.sunat.gob.pe/descargaPRR/padron_reducido_local_anexo.zip"
    file_format:
      compression: zip
      inner: txt
      delimiter: "|"
      encoding: "ISO-8859-1"
      has_header: false
    nodes_populated:
      - Company
    edges_created:
      - MISMO_DOMICILIO  # calculado después de cargar todos
    columns:
      - { pos: 0,  name: ruc,               target: "Company.ruc",                type: str }
      - { pos: 1,  name: razon_social,       target: "Company.razon_social",       type: str, transform: strip_upper }
      - { pos: 2,  name: estado,             target: "Company.metadata.estado",    type: str }
      - { pos: 3,  name: condicion,          target: "Company.metadata.condicion", type: str }
      - { pos: 4,  name: ubigeo,             target: "Company.ubigeo",             type: str }
      - { pos: 5,  name: tipo_via,           target: "Company.metadata.tipo_via",  type: str }
      - { pos: 6,  name: nombre_via,         target: "Company.metadata.nom_via",   type: str }
      - { pos: 7,  name: codigo_zona,        target: "Company.metadata.cod_zona",  type: str }
      - { pos: 8,  name: tipo_zona,          target: "Company.metadata.tip_zona",  type: str }
      - { pos: 9,  name: numero,             target: "Company.metadata.numero",    type: str }
      - { pos: 10, name: interior,           target: "Company.metadata.interior",  type: str }
      - { pos: 11, name: lote,               target: "Company.metadata.lote",      type: str }
      - { pos: 12, name: dpto,               target: "Company.metadata.dpto",      type: str }
      - { pos: 13, name: manzana,            target: "Company.metadata.manzana",   type: str }
      - { pos: 14, name: kilometro,          target: "Company.metadata.km",        type: str }
    post_processing:
      flag_no_habido:
        query: "UPDATE entities SET metadata = metadata || '{\"flag_no_habido\": true}' WHERE metadata->>'condicion' = 'NO HABIDO'"
      flag_baja:
        query: "UPDATE entities SET metadata = metadata || '{\"flag_baja\": true}' WHERE metadata->>'estado' ILIKE '%BAJA%'"
      domicilio_compartido:
        description: "Agrupar por dirección, marcar empresas con >5 vecinos"
        query: |
          WITH dom_count AS (
            SELECT
              metadata->>'tipo_via' || metadata->>'nom_via' || metadata->>'numero' || ubigeo AS dom_key,
              COUNT(*) AS n
            FROM entities WHERE entity_type = 'company'
            GROUP BY dom_key
            HAVING COUNT(*) > 5
          )
          UPDATE entities e
          SET metadata = metadata || jsonb_build_object('flag_domicilio_compartido', true, 'empresas_mismo_dom', dc.n)
          FROM dom_count dc
          WHERE e.metadata->>'tipo_via' || e.metadata->>'nom_via' || e.metadata->>'numero' || e.ubigeo = dc.dom_key;

  CGR_SANCIONES:
    name: "Contraloría — Registro de Sanciones"
    url: "https://www.gob.pe/institucion/contraloria/informes-publicaciones/2706979-registro-de-sanciones-inscritas-y-vigentes"
    method: playwright_download
    auth: none
    js_required: true
    spa_type: "React (gob.pe)"
    format: xlsx
    update: monthly
    playwright_steps:
      - action: goto
        url: "https://www.gob.pe/institucion/contraloria/informes-publicaciones/2706979-registro-de-sanciones-inscritas-y-vigentes"
      - action: wait_for_selector
        selector: "a[href*='.xlsx'], a[href*='download']"
        timeout_ms: 15000
      - action: intercept_download
        click_selector: "a[href*='.xlsx']"
      - action: save_file
        path: "data/raw/sanciones_{date}.xlsx"
    nodes_populated:
      - Person
      - Sancion
    edges_created:
      - TIENE_SANCION
    xlsx_columns:
      - { col: A, name: dni,               target: "Person.canonical_id" }
      - { col: B, name: nombres,           target: "Person.display_name (split)" }
      - { col: C, name: apellidos,         target: "Person.display_name (split)" }
      - { col: D, name: tipo_sancion,      target: "Sancion.tipo_sancion" }
      - { col: E, name: fecha_inicio,      target: "Sancion.fecha_inicio",      type: date }
      - { col: F, name: fecha_fin,         target: "Sancion.fecha_fin",         type: date }
      - { col: G, name: entidad,           target: "Sancion.entidad_nombre" }
      - { col: H, name: num_resolucion,    target: "Sancion.numero_resolucion" }
    computed_fields:
      vigente:
        formula: "fecha_fin IS NULL OR fecha_fin >= CURRENT_DATE"

  CGR_INFORMES:
    name: "Contraloría — Buscador de Informes de Control"
    url: "https://appbp.contraloria.gob.pe/BuscadorCGR/informes/Avanzado.html"
    method: playwright_xhr_intercept
    auth: none
    js_required: true
    spa_type: "Angular/jQuery + Java backend"
    format: json_api_plus_pdf
    update: weekly
    usage: "Solo entidades con score > 0.30 — no scraping masivo"
    rate_limit: "10 req/min"
    playwright_steps:
      - action: goto
        url: "https://appbp.contraloria.gob.pe/BuscadorCGR/informes/Avanzado.html"
      - action: wait_for_state
        state: networkidle
      - action: intercept_responses
        pattern: "BuscadorCGR"
        capture_json: true
      - action: fill_search
        field_selector: "#entidad"
        value: "{entidad_id}"
      - action: click
        selector: "#buscar-btn"
      - action: wait_for_state
        state: networkidle
      - action: extract_results
        from: intercepted_json
    nodes_populated:
      - AuditReport
    edges_created:
      - MENCIONADO_EN
    fields_from_api:
      - { api_key: numInforme,      target: "AuditReport.numero_informe" }
      - { api_key: tipoControl,     target: "AuditReport.tipo_control" }
      - { api_key: entidadAuditada, target: "AuditReport.entidad_auditada" }
      - { api_key: region,          target: "AuditReport.region" }
      - { api_key: fechaInforme,    target: "AuditReport.fecha_informe", type: date }
      - { api_key: pdfUrl,          target: "AuditReport.pdf_url" }
    pdf_extraction:
      tool: pdfplumber
      extract_patterns:
        personas_mencionadas:
          regex: "(?:DNI|C\\.I\\.)\\s*(\\d{7,8})|([A-Z]{2,}\\s+[A-Z]{2,}\\s+[A-Z]{2,})"
          target: "AuditReport.personas_mencionadas"
        hallazgos:
          section_marker: "HALLAZGOS"
          max_chars: 2000
          target: "AuditReport.hallazgos_resumen"

  SIDJI:
    name: "Contraloría — SIDJI Declaraciones Juradas de Intereses"
    url: "https://appdji.contraloria.gob.pe/djic/"
    method: playwright_on_demand
    auth: none
    js_required: true
    spa_type: "ASP.NET + CAPTCHA imagen simple"
    format: html_parsed
    update: on_demand
    usage: "Solo casos con score > 0.50 — NO masivo"
    public_sections:
      - label: "Buscar Declaración Jurada de Intereses"
        action: click_public_search_button
      - label: "Conoce a los familiares declarados"
        action: click_familiares_button
    playwright_steps:
      - action: goto
        url: "https://appdji.contraloria.gob.pe/djic/"
      - action: click
        selector: "a[href*='buscar'], .btn-buscar-dji"
      - action: fill
        selector: "#nombre-funcionario, input[name='nombre']"
        value: "{nombre_funcionario}"
      - action: solve_captcha
        type: image_simple
        note: "CAPTCHA simple de imagen — resolver con pytesseract o manual"
      - action: click
        selector: "input[type='submit'], .btn-buscar"
      - action: extract_table
        selector: "table.resultados"
    nodes_populated:
      - InterestDeclaration
      - Person
    edges_created:
      - VINCULO_DJI
      - FAMILIAR_DE
    fields_from_html:
      - { selector: "td.nombre",     target: "Person.display_name" }
      - { selector: "td.cargo",      target: "Person.metadata.cargo" }
      - { selector: "td.entidad",    target: "Person.metadata.entidad" }
      - { selector: "table.vinculos", target: "InterestDeclaration.vinculos_empresariales", type: table_to_json }
      - { selector: "table.familiares", target: "InterestDeclaration.familiares", type: table_to_json }

  ONPE_CLARIDAD:
    name: "ONPE — Claridad (Financiamiento Electoral)"
    url: "https://claridadportal.onpe.gob.pe/"
    method: playwright_xhr_intercept
    auth: none
    js_required: true
    spa_type: "React/Vue SPA"
    format: json_api
    update: on_demand
    search_types:
      - by_ruc: "Buscar por RUC del aportante"
      - by_dni: "Buscar por DNI del aportante"
      - by_org: "Buscar por organización política"
    nodes_populated:
      - ElectoralContribution
      - PoliticalOrg
    edges_created:
      - APORTO_A
    fields_from_api:
      - { api_key: rucAportante,    target: "ElectoralContribution.aportante_ruc" }
      - { api_key: nombreAportante, target: "ElectoralContribution.aportante_nombre" }
      - { api_key: orgPolitica,     target: "ElectoralContribution.org_politica" }
      - { api_key: monto,           target: "ElectoralContribution.monto", type: float }
      - { api_key: tipoAporte,      target: "ElectoralContribution.tipo_aporte" }
      - { api_key: campana,         target: "ElectoralContribution.campana" }
      - { api_key: fechaAporte,     target: "ElectoralContribution.fecha_aporte", type: date }

  JNE_PLATAFORMAS:
    name: "JNE — Voto Informado + Plataforma Electoral"
    urls:
      voto_informado: "https://votoinformado.jne.gob.pe/"
      plataforma: "https://plataformaelectoral.jne.gob.pe/"
    method: playwright_xhr_intercept
    auth: none
    js_required: true
    spa_type: "Angular (base href='/' confirma)"
    format: json_api
    update: on_demand
    nodes_populated:
      - Person
      - PoliticalOrg
    edges_created:
      - CANDIDATO_EN
      - GOVERNS
    fields_from_api:
      - { api_key: nombres,             target: "Person.display_name" }
      - { api_key: dni,                 target: "Person.canonical_id" }
      - { api_key: partido,             target: "PoliticalOrg.nombre" }
      - { api_key: cargoPostulado,      target: "relationships.CANDIDATO_EN.cargo_candidato" }
      - { api_key: resultadoElectoral,  target: "relationships.CANDIDATO_EN.resultado" }
      - { api_key: sentenciasDeclaradas,target: "Person.metadata.sentencias_decl", type: list }
      - { api_key: bienesDeclarados,    target: "Person.metadata.bienes", type: json }

  MEF_DATOS:
    name: "MEF — Portal de Datos Abiertos (CKAN)"
    url: "https://datosabiertos.mef.gob.pe"
    method: ckan_api
    auth: none
    js_required: false
    format: csv_json
    update: monthly
    api_endpoints:
      list:   "https://datosabiertos.mef.gob.pe/api/3/action/package_list"
      search: "https://datosabiertos.mef.gob.pe/api/3/action/package_search?q={query}"
      show:   "https://datosabiertos.mef.gob.pe/api/3/action/package_show?id={id}"
    priority_datasets:
      ejecucion_gasto: "ejecucion-del-gasto-publico"
      pim:             "presupuesto-institucional-modificado-pim"
      inversion:       "inversion-publica"
    nodes_populated:
      - PublicEntity  # enriquece con PIM y ejecución
    fields_from_csv:
      - { csv_col: "NOMBRE_ENTIDAD",    target: "PublicEntity.nombre_canonico" }
      - { csv_col: "PIM",               target: "PublicEntity.metadata.pim_vigente", type: float }
      - { csv_col: "DEVENGADO",         target: "PublicEntity.metadata.devengado",   type: float }
      - { csv_col: "GIRADO",            target: "PublicEntity.metadata.girado",      type: float }
      - { csv_col: "UBIGEO",            target: "PublicEntity.ubigeo" }
      - { csv_col: "DPTO",              target: "PublicEntity.region" }
    computed:
      ejecucion_pct:
        formula: "devengado / pim"
        flag: "ejecucion_pct > 0.95 AND total_contratos_seace < 3"

  SUNARP_PJ:
    name: "SUNARP — Personas Jurídicas (datosabiertos.gob.pe)"
    url: "https://www.datosabiertos.gob.pe/dataset/sunarp-informaci%C3%B3n-de-personas-jur%C3%ADdicas"
    resource_url: "https://www.sunarp.gob.pe/consulta-pj.html"
    method: html_scraping_or_api
    auth: none
    js_required: false
    format: html_table
    update: monthly
    dataset_id: "857fe68f-fd8b-4f1e-bd69-ced7b7a27acc"
    nodes_populated:
      - Company
    edges_created:
      - REPRESENTANTE_DE
      - MISMO_REPR_LEGAL
    fields_available:
      - denominacion_social
      - siglas
      - tipo_sociedad
      - partida_registral
      - oficina_registral
      - representante_legal_nombre
      - representante_legal_cargo
      - fecha_inscripcion
      - capital_social
    usage: "Entity resolution + representante legal → cruzar con SIDJI + CGR"

  CONGRESO_LEYES:
    name: "Congreso — Archivo Digital de la Legislación"
    url: "https://www.leyes.congreso.gob.pe/"
    method: aspnet_form_scraping
    auth: none
    js_required: false
    spa_type: "ASP.NET WebForms (server-side HTML)"
    format: html_table_plus_pdf
    update: on_demand
    endpoints:
      leyes:  "https://www.leyes.congreso.gob.pe/LeyNumePP.aspx?xNorma=0"
      dl:     "https://www.leyes.congreso.gob.pe/LeyNumePP.aspx?xNorma=3"
      du:     "https://www.leyes.congreso.gob.pe/LeyNumePP.aspx?xNorma=5"
    priority_laws:
      - { num: "32069", title: "Ley General de Contrataciones Públicas", tags: ["umbrales","impedimentos","modalidades","sanciones"] }
      - { num: "30225", title: "Ley anterior de Contrataciones (referencia)", tags: ["historico"] }
      - { num: "27444", title: "Ley del Procedimiento Administrativo General", tags: ["debido_proceso"] }
    nodes_populated:
      - LegalNorm
    use_for: "RAG legal — justificación de red flags con artículos específicos"
    pdf_tool: pdfplumber
    embedding_model: "text-embedding-3-small"
    vector_store: "pgvector table legal_chunks"

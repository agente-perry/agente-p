# ============================================================
# NEO Intelligence Platform — Scraping Configuration
# Archivo de configuración maestro para todos los collectors
# Versión: 1.0 | Fecha: Mayo 2026
# Para uso con Claude Code / agente de desarrollo
# ============================================================

project:
  name: "neo-intelligence-platform"
  description: "Sistema de detección de riesgo en contrataciones públicas Perú"
  organization: "NEO Consulting"
  website: "neoconsulting.ai"
  methodology: "FUNES (Ojo Público) + OCDS Standard"

# ============================================================
# FUENTES DE DATOS — Ordenadas por prioridad
# ============================================================

sources:

  # ─────────────────────────────────────────────────
  # P0 — CRÍTICAS: Implementar primero (Sprint 1-2)
  # ─────────────────────────────────────────────────

  - id: ocds_peru
    name: "OCDS Perú — Open Contracting Data Registry"
    priority: P0
    sprint: 1
    url: "https://data.open-contracting.org/es/publication/135"
    license: "CC BY 4.0"
    method: direct_download
    formats: [jsonl_gz, csv_tar_gz, xlsx]
    auth_required: false
    js_required: false
    difficulty: easy

    endpoints:
      download_base: "https://data.open-contracting.org/es/publication/135/download"
      pattern_json: "?name={year}.jsonl.gz"
      pattern_csv:  "?name={year}.csv.tar.gz"
      pattern_xlsx: "?name={year}.xlsx"
      full_json: "?name=full.jsonl.gz"
      full_csv:  "?name=full.csv.tar.gz"

    download_sizes:
      full_json_mb: 2055
      full_csv_mb: 2567
      year_2026_json_mb: 77
      year_2025_json_mb: 170
      year_2024_json_mb: 147

    bootstrap_years: [2022, 2023, 2024, 2025, 2026]
    update_frequency: monthly  # Dato actualizado diariamente en origen
    update_day: 1  # Día 1 de cada mes

    ocds_metadata:
      ocid_prefix: "ocds-dgv273"
      tenders_count: 2724866
      awards_count: 1986377
      contracts_count: 1297467
      tenderers_count: 9679259
      parties_count: 12404151
      date_range: "2003-01 to 2026-05"

    fields_to_extract:
      - ocid
      - date
      - tender.id
      - tender.title
      - tender.status
      - tender.value.amount
      - tender.value.currency
      - tender.procurementMethod
      - tender.procurementMethodDetails
      - tender.numberOfTenderers
      - tender.tenderPeriod.startDate
      - tender.tenderPeriod.endDate
      - tender.items
      - buyer.identifier.id
      - buyer.name
      - awards[].value.amount
      - awards[].suppliers[].identifier.id
      - awards[].suppliers[].name
      - contracts[].value.amount
      - contracts[].period.startDate
      - contracts[].period.endDate
      - planning.budget.amount.amount
      - parties[].identifier.id
      - parties[].roles

    red_flags:
      - id: single_tenderer
        field: "tender.numberOfTenderers"
        condition: "== 1"
        weight: 0.15
        description: "Proceso sin competencia — único postor"

      - id: direct_award
        field: "tender.procurementMethod"
        condition: "== 'direct'"
        weight: 0.12
        description: "Contratación directa sin licitación"

      - id: value_delta
        fields: ["tender.value.amount", "contracts[].value.amount"]
        condition: "abs_delta > 20%"
        weight: 0.08
        description: "Diferencia >20% entre monto convocado y contratado"

      - id: no_planning
        field: "planning"
        condition: "is null or empty"
        weight: 0.05
        description: "Contrato sin planeación registrada"

    collector_file: "collectors/ocds/ocds_collector.py"
    db_table: "contratos_ocds"
    parser: "parsers/ocds_flattener.py"


  - id: sunat_padron
    name: "SUNAT — Padrón Reducido del RUC"
    priority: P0
    sprint: 1
    url: "https://www.sunat.gob.pe/descargaPRR/mrc137_padron_reducido.html"
    method: direct_download_zip
    formats: [zip_txt]
    auth_required: false
    js_required: false
    difficulty: easy
    captcha: false

    endpoints:
      padron_ruc: "http://www2.sunat.gob.pe/padron_reducido_ruc.zip"
      local_anexo: "https://www.sunat.gob.pe/descargaPRR/padron_reducido_local_anexo.zip"

    file_format:
      compression: zip
      inner_format: txt
      delimiter: "|"
      encoding: "ISO-8859-1"
      header: false

    columns:
      - name: ruc
        type: VARCHAR(11)
        description: "RUC del contribuyente (11 dígitos)"
        key: true
      - name: razon_social
        type: VARCHAR(500)
        description: "Razón social o nombre del contribuyente"
      - name: estado_contribuyente
        type: VARCHAR(50)
        description: "ACTIVO | BAJA PROVISIONAL | BAJA DEFINITIVA"
      - name: condicion_domicilio
        type: VARCHAR(50)
        description: "HABIDO | NO HABIDO"
      - name: ubigeo
        type: VARCHAR(10)
        description: "Código de ubigeo (departamento-provincia-distrito)"
      - name: tipo_via
        type: VARCHAR(50)
      - name: nombre_via
        type: VARCHAR(200)
      - name: codigo_zona
        type: VARCHAR(20)
      - name: tipo_zona
        type: VARCHAR(50)
      - name: numero
        type: VARCHAR(20)
      - name: interior
        type: VARCHAR(20)
      - name: lote
        type: VARCHAR(20)
      - name: dpto
        type: VARCHAR(10)
      - name: manzana
        type: VARCHAR(20)
      - name: kilometro
        type: VARCHAR(20)

    stats:
      records_count: 14500000  # ~14.5 millones de registros
      file_size_mb: 200        # Aproximado del ZIP

    update_frequency: monthly

    red_flags:
      - id: no_habido
        field: condicion_domicilio
        condition: "== 'NO HABIDO'"
        description: "Proveedor sin domicilio fiscal encontrable"
      - id: baja_definitiva
        field: estado_contribuyente
        condition: "contains 'BAJA'"
        description: "Empresa de baja contratando con el Estado"
      - id: domicilio_compartido
        calculated: true
        condition: "count empresas mismo domicilio > 5"
        description: "Múltiples empresas en mismo domicilio — posible empresa fantasma"
      - id: empresa_nueva
        calculated: true
        requires_join: sunat_actividades  # Fecha de inicio actividades
        condition: "antiguedad_meses < 12 at convocatoria date"
        description: "Empresa registrada < 1 año antes de la licitación"

    sunat_team_setup:
      # Repositorios recomendados para el equipo SUNAT
      repos:
        - name: "consulta-peru (Kembec)"
          url: "https://github.com/Kembec/consulta-peru"
          use_case: "API local + CLI con ElasticSearch — consultas rápidas sin depender de SUNAT online"
          setup: |
            git clone https://github.com/Kembec/consulta-peru.git
            cd consulta-peru
            cp backend/.env.template backend/.env
            # Editar .env con credenciales ElasticSearch
            docker-compose build && docker-compose up -d
            docker-compose run app python /usr/src/app/indexer.py  # Indexar padrón
          cli_command: "docker-compose run app python /usr/src/app/searcher.py"
          api_endpoint: "GET http://localhost:5000/ruc/{numero_ruc}"

        - name: "sunat_padron_ruc (jorgechavez6816)"
          url: "https://github.com/jorgechavez6816/sunat_padron_ruc"
          use_case: "Script Python para descarga automática del padrón — 14.5M+ registros"
          main_file: "sunat_padron_ruc.py"

        - name: "consulta-masiva-ruc-sunat (Paulihr)"
          url: "https://github.com/Paulihr/consulta-masiva-ruc-sunat"
          use_case: "Selenium para consulta masiva de hasta 100 RUC por batch"
          limitations: ["Requiere Selenium", "CAPTCHA semi-manual", "Máx 100 RUC/batch"]

        - name: "pe-sunat (Cordada)"
          pypi: "pe-sunat"
          version: "1.9.0"
          url: "https://github.com/cordada/lib-pe-sunat-python"
          use_case: "Validación de dígito verificador de RUC — no consulta datos"
          install: "pip install pe-sunat"
          example: |
            from cordada.pe_sunat.ruc.entities import Ruc
            ruc = Ruc('20131312955')  # Valida formato y check digit

      oauth2_api:
        description: "SUNAT OAuth2 para servicios SOL (comprobantes electrónicos)"
        token_url: "https://api-seguridad.sunat.gob.pe/v1/clientesextranet/{client_id}/oauth2/token/"
        scope: "https://api.sunat.gob.pe/v1/contribuyente/contribuyentes"
        requirements:
          - "Cuenta SOL (Sistema Operaciones en Línea)"
          - "Generar client_id + client_secret en SUNAT SOL"
          - "RUC de la empresa con cuenta SOL activa"
        env_vars:
          - SUNAT_CLIENT_ID
          - SUNAT_CLIENT_SECRET
          - SUNAT_RUC
          - SUNAT_USUARIO_SOL
          - SUNAT_CLAVE_SOL
        notes: "Principalmente para CPE (facturas electrónicas). Para consulta general de RUC usar el Padrón."

      third_party_apis:
        description: "APIs de terceros como alternativa (requieren pago/registro)"
        options:
          - name: "ApiInti"
            url: "https://apiinti.dev/en/"
            use_case: "RUC + DNI consultas vía REST"
          - name: "apis.net.pe"
            url: "https://apis.net.pe/"
            use_case: "RUC, DNI, tipo de cambio SUNAT"
          - name: "api.migo.pe"
            url: "https://api.migo.pe/"
            use_case: "RUC, DNI, tipo de cambio"
          - name: "floid.io"
            url: "https://www.floid.io/pe/servicios/api-sunat"
            use_case: "Validación tributaria SUNAT vía API"
        recommendation: "Usar solo como fallback. El Padrón Reducido local es más completo y gratuito."

    collector_file: "collectors/sunat/padron_collector.py"
    db_table: "sunat_padron"


  - id: sunat_multi_ruc
    name: "SUNAT — Consulta Múltiple de RUC (hasta 100 RUC)"
    priority: P0_P1
    sprint: 2
    url: "https://e-consultaruc.sunat.gob.pe/cl-ti-itmrconsmulruc/jrmS00Alias"
    method: form_post_with_file_upload
    auth_required: false
    js_required: partial
    captcha: true
    captcha_type: "image_simple"
    difficulty: very_high

    form_structure:
      method: POST
      encoding: "ISO-8859-1"
      file_format: "TXT — un RUC por línea con pipe: '20131312955|'"
      max_ruc_per_batch: 100
      max_manual_entry: 10

    fields_returned:
      - ruc
      - razon_social
      - estado_contribuyente
      - condicion_domicilio
      - actividad_economica_ciiu
      - domicilio_fiscal_actual
      - regimen_tributario

    usage_policy:
      frequency: "Solo bajo demanda — NO usar para batch masivo"
      use_case: "Validación de proveedores P0 críticos no cubiertos por el Padrón"
      rate_limit: "2 consultas/minuto máximo"
      preferred_tool: "consulta-masiva-ruc-sunat (Paulihr) con Playwright"

    collector_file: "collectors/sunat/multi_ruc.py"


  - id: contraloria_sanciones
    name: "Contraloría — Registro de Sanciones Inscritas y Vigentes"
    priority: P0
    sprint: 2
    url: "https://www.gob.pe/institucion/contraloria/informes-publicaciones/2706979-registro-de-sanciones-inscritas-y-vigentes"
    method: playwright_spa
    formats: [xlsx]
    auth_required: false
    js_required: true
    spa_type: "React (gob.pe platform)"
    difficulty: medium

    playwright_strategy:
      wait_for: "a[href*='.xlsx']"
      action: "click download link"
      timeout_ms: 15000
      use_download_intercept: true

    fields_to_extract:
      - dni
      - nombres
      - apellidos
      - tipo_sancion
      - vigencia_inicio
      - vigencia_fin
      - entidad_sancionadora
      - numero_resolucion

  - id: convoca_periodismo
    name: "Convoca — Investigaciones Periodísticas"
    priority: P1_P2
    sprint: 4
    urls:
      contrataciones: "https://convoca.pe/tags/contrataciones-publicas"
      pandemia: "https://convoca.pe/especiales/expedientes-de-la-pandemia"
    method: html_scraping_drupal9
    auth_required: false
    js_required: false
    cms: "Drupal 9"
    difficulty: easy

    pagination:
      pattern: "?page={n}"
      max_pages: 3

    # IMPORTANTE: Solo guardar metadata, no republicar contenido
    fields_to_extract:
      - url_articulo
      - titulo
      - fecha_publicacion
      - resumen_snippet  # Max 150 chars — NO copiar contenido completo

    legal_note: "Solo indexar URL + título + resumen breve. No republicar contenido completo. Respetar copyright."

    use_case: "Cross-reference automático: cuando un nodo OCDS tiene >0.7 risk score, buscar menciones periodísticas"

    collector_file: "collectors/enrichment/convoca_scraper.py"
    db_table: "referencias_periodisticas"


  # ─────────────────────────────────────────────────
  # P3 — CONTEXTUAL: Solo consulta manual
  # ─────────────────────────────────────────────────

  - id: poder_judicial
    name: "Poder Judicial — Expedientes"
    priority: P3
    method: manual_only
    url: "https://www.pj.gob.pe/"
    automation: false
    reason: "Datos judiciales requieren verificación humana. Solo sentencias firmes públicas."
    use_case: "Contexto adicional para dossiers de alto riesgo — nunca prueba automática"

  - id: ministerio_publico
    name: "Ministerio Público — Comunicados"
    priority: P3
    method: manual_contextual
    url: "https://www.gob.pe/mpfn"
    automation: false
    use_case: "Comunicados oficiales y notas de prensa de investigaciones activas"

# ============================================================
# SCORING — Configuración del algoritmo de riesgo
# ============================================================

scoring:
  algorithm: "FUNES_adapted"
  methodology_reference: "https://ojo-publico.com/especiales/funes/metodologia.html"
  version: "1.0"

  proxies_corrupcion:
    - name: "unico_postor"
      description: "Proceso con un solo postor (proxy de ausencia de competencia)"
      model: "logistic_regression"
    - name: "concentracion_gasto"
      description: "Proporción del presupuesto de entidad que tiene un contratista"
      model: "beta_regression"

  indicators:
    # De SUNAT (4 indicadores)
    - id: empresa_nueva
      source: sunat_padron
      weight: 0.08
      description: "Edad de la empresa al momento de convocatoria (<1 año = alto riesgo)"

    - id: representante_multi_empresa
      source: sunat_padron
      weight: 0.06
      description: "N.° de empresas representadas por representantes legales del postor"

    - id: domicilio_compartido
      source: sunat_padron
      weight: 0.05
      description: "N.° de empresas registradas en el mismo domicilio fiscal"

    # De OCDS/OSCE (13 indicadores)
    - id: unico_postor
      source: ocds_peru
      field: "tender.numberOfTenderers"
      weight: 0.15
      condition: "== 1"
      description: "Se presenta un único postor a la convocatoria"

    - id: concentracion_gasto
      source: ocds_peru
      weight: 0.10
      description: "Proporción del presupuesto de la entidad que tiene el contratista"
      calculation: "sum(contracts_won) / total_entity_budget"

    - id: contratacion_directa
      source: ocds_peru
      field: "tender.procurementMethod"
      weight: 0.12
      condition: "== 'direct'"
      description: "Tipo de proceso: contratación directa"

    - id: proveedor_sancionado
      source: contraloria_sanciones
      weight: 0.10
      description: "El proveedor ha sido sancionado previamente por el Tribunal"

    - id: proceso_reiniciado
      source: ocds_peru
      weight: 0.06
      description: "El proceso de contratación fue reiniciado (posible manipulación)"

    - id: plazo_corto
      source: ocds_peru
      weight: 0.07
      description: "Tiempo de convocatoria < 5 días útiles"
      calculation: "business_days(tender.tenderPeriod.startDate, tender.tenderPeriod.endDate)"

    - id: monto_atipico
      source: ocds_peru
      weight: 0.05
      description: "Monto del contrato > P95 de la categoría/sector"

    - id: relacion_recurrente
      source: ocds_peru
      weight: 0.08
      description: "Proveedor gana de forma recurrente en misma entidad/oficina"
      calculation: "win_rate_same_entity > 0.7"

    - id: delta_monto
      source: ocds_peru
      weight: 0.05
      description: "Diferencia >20% entre monto convocado y monto contratado"

    # Político (2 indicadores — de ONPE + JNE)
    - id: conexion_politica_funcionario
      source: ["onpe_claridad", "jne_plataformas"]
      weight: 0.08
      description: "Conexión política del postor con altos funcionarios de entidad"

    - id: conexion_politica_comite
      source: ["onpe_claridad", "jne_plataformas"]
      weight: 0.05
      description: "Conexión política del postor con miembros del comité de selección"

  risk_thresholds:
    bajo: [0.0, 0.3]
    medio: [0.3, 0.5]
    alto: [0.5, 0.7]
    critico: [0.7, 1.0]

  output_fields:
    - ocid
    - risk_score
    - risk_level
    - active_flags
    - top_3_indicators
    - buyer_id
    - supplier_ids
    - tender_amount
    - contract_amount
    - scoring_date

# ============================================================
# BASE DE DATOS
# ============================================================

database:
  engine: "postgresql"
  version: "16"
  extensions:
    - "pgvector"      # Para RAG legal (embeddings de la Ley 32069)
    - "pg_trgm"       # Para búsqueda fuzzy de nombres
    - "unaccent"      # Para búsqueda sin tildes

  tables:
    - name: contratos_ocds
      primary_source: ocds_peru
      partition_by: source_year
      indexes:
        - buyer_id
        - supplier_ids (GIN)
        - risk_level
        - tender_procurement_method

    - name: sunat_padron
      primary_source: sunat_padron
      primary_key: ruc
      indexes:
        - estado_contribuyente
        - condicion_domicilio
        - ubigeo

    - name: contraloria_sanciones
      primary_source: contraloria_sanciones
      indexes:
        - dni
        - vigente
        - fecha_fin

    - name: cgr_informes
      primary_source: cgr_informes
      indexes:
        - entidad_auditada
        - fecha_informe
        - personas_mencionadas (GIN)

    - name: relaciones
      description: "Grafo de relaciones para NetworkX"
      indexes:
        - nodo_origen
        - nodo_destino
        - tipo_relacion

    - name: risk_scores
      indexes:
        - risk_level
        - score_date
        - ocid

# ============================================================
# TECNOLOGÍAS Y DEPENDENCIAS
# ============================================================

dependencies:
  python: ">=3.11"

  core:
    - requests>=2.31
    - pandas>=2.0
    - sqlalchemy>=2.0
    - psycopg2-binary>=2.9
    - python-dotenv>=1.0

  scraping:
    - playwright>=1.44
    - beautifulsoup4>=4.12
    - lxml>=4.9
    - ijson>=3.2          # Streaming JSON para OCDS
    - aiohttp>=3.9        # Async HTTP

  data_processing:
    - pdfplumber>=0.10    # Extracción de texto de PDFs
    - openpyxl>=3.1       # Lectura de XLSX
    - networkx>=3.2       # Grafo de relaciones
    - numpy>=1.26
    - tqdm>=4.66          # Progress bars

  sunat_specific:
    - pe-sunat>=1.9.0     # Validación de RUC (check digit)

  rag_legal:
    - langchain>=0.2
    - langchain-openai>=0.1
    - pgvector>=0.2

  scheduler:
    - apache-airflow>=2.9

  api:
    - fastapi>=0.110
    - uvicorn>=0.29

  monitoring:
    - prometheus-client>=0.20
    - structlog>=24.0

# ============================================================
# SCHEDULER — Frecuencias de actualización
# ============================================================

scheduler:
  engine: "apache-airflow"

  dags:
    - id: monthly_bulk_download
      cron: "0 3 1 * *"  # Día 1 de cada mes, 3am
      tasks:
        - download_ocds_current_year
        - download_sunat_padron
        - download_contraloria_sanciones
        - download_mef_datasets
        - recalculate_risk_scores
        - rebuild_graph

    - id: weekly_enrichment
      cron: "0 4 * * 1"  # Lunes 4am
      tasks:
        - scrape_cgr_high_risk_entities
        - update_convoca_references

    - id: on_demand_validation
      trigger: manual
      tasks:
        - validate_batch_ruc_sunat
        - scrape_sidji_funcionario
        - search_jne_candidato

# ============================================================
# VARIABLES DE ENTORNO
# ============================================================

env_vars:
  required:
    - DATABASE_URL

  optional_sunat_oauth:
    - SUNAT_CLIENT_ID       # Para OAuth2 SOL
    - SUNAT_CLIENT_SECRET
    - SUNAT_RUC
    - SUNAT_USUARIO_SOL
    - SUNAT_CLAVE_SOL

  optional_services:
    - ELASTICSEARCH_URL
    - ELASTICSEARCH_USERNAME
    - ELASTICSEARCH_PASSWORD
    - OPENAI_API_KEY         # Para RAG legal con LangChain
    - AIRFLOW_HOME

  logging:
    - LOG_LEVEL              # INFO (default) | DEBUG | WARNING
    - LOG_FILE               # Ruta al archivo de log

# ============================================================
# SPRINT PLAN — Orden de implementación recomendado
# ============================================================

implementation_plan:

  sprint_1:
    name: "Bootstrap — Las 2 fuentes más valiosas"
    duration_weeks: 2
    goal: "Tener el universo completo de contratos + entity resolution funcionando"
    tasks:
      - implement: ocds_collector.py
        priority: P0
        effort_days: 3
        description: "Descargar OCDS 2022-2026, parsear JSONL.gz, cargar a Postgres"

      - implement: padron_collector.py
        priority: P0
        effort_days: 2
        description: "Descargar ZIP SUNAT, parsear TXT, indexar en Postgres"

      - implement: db/schema.sql
        priority: P0
        effort_days: 1
        description: "Crear todas las tablas + índices + pgvector extension"

      - implement: entity_resolver.py
        priority: P0
        effort_days: 2
        description: "Cross-reference RUC entre OCDS y Padrón SUNAT"

    deliverable: "API básica que responde: /ruc/{ruc} con datos de contratos + estado SUNAT"

  sprint_2:
    name: "Alertas — Sanciones + Score básico"
    duration_weeks: 2
    goal: "Primeros alertas automáticos de riesgo funcionando"
    tasks:
      - implement: sanciones_collector.py
        description: "Playwright para descargar XLSX de Contraloría"

      - implement: mef_collector.py
        description: "CKAN API para datos de presupuesto MEF"

      - implement: risk_scorer.py
        description: "7 indicadores básicos: único postor, directa, sancionado, delta monto"

      - implement: sunat_multi_ruc.py
        description: "Playwright semi-automático para validaciones puntuales"

    deliverable: "Score de riesgo calculado para todos los contratos OCDS 2024-2026"

  sprint_3:
    name: "Enriquecimiento — CGR + Grafo + RAG Legal"
    duration_weeks: 2
    tasks:
      - implement: cgr_scraper.py
        description: "Playwright + XHR intercept para informes de control"

      - implement: congreso_scraper.py
        description: "ASP.NET scraping de Ley 32069, indexar en pgvector"

      - implement: graph_builder.py
        description: "NetworkX: grafo empresa-entidad-funcionario-político"

      - setup: airflow_dags
        description: "DAGs de actualización mensual/semanal"

    deliverable: "Dashboard MVP con top 100 procesos de mayor riesgo"

  sprint_4_plus:
    name: "Fuentes electorales y periodísticas"
    duration_weeks: 3
    tasks:
      - implement: onpe_scraper.py
        description: "Claridad: aportes electorales por RUC proveedor"
      - implement: jne_scraper.py
        description: "Voto Informado + Plataforma Electoral"
      - implement: convoca_scraper.py
        description: "Cross-reference periodístico automático"
      - implement: sidji_scraper.py
        description: "DJI bajo demanda para casos críticos"


      - id: comite_miembro_sancionado
        description: "Miembro de comité de selección con sanción activa"
      - id: inhabilitado_contratando
        description: "Persona inhabilitada involucrada en proceso de contratación"

    collector_file: "collectors/contraloria/sanciones_collector.py"
    db_table: "contraloria_sanciones"


  - id: cgr_informes
    name: "Contraloría — Buscador de Informes de Control"
    priority: P0_P1
    sprint: 3
    url: "https://appbp.contraloria.gob.pe/BuscadorCGR/informes/Avanzado.html"
    method: playwright_plus_xhr_intercept
    formats: [json_api, pdf]
    auth_required: false
    js_required: true
    spa_type: "Angular o jQuery — app BP (Business Process)"
    difficulty: high

    playwright_strategy:
      approach: "Interceptar llamadas XHR para obtener endpoint JSON directo"
      wait_for_state: "networkidle"
